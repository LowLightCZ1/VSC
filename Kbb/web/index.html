<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock the Secret</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 400px;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }
        p {
            font-size: 16px;
            color: #555;
            margin-bottom: 20px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 100%;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .message {
            margin-top: 20px;
            font-size: 18px;
        }
        #secretMessage {
            color: green;
            font-weight: bold;
        }
        #error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Enter the Code</h1>
        <p>Enter the 16-character access code using digits 0–9 and letters A–F:</p>
        <form onsubmit="checkCode(event)">
            <input type="text" id="code" maxlength="16" pattern="[0-9A-Fa-f]{16}" required>
            <button type="submit">Submit</button>
        </form>
        <div class="message" id="secretMessage" style="display: none;"></div>
        <div class="message" id="error" style="display: none;">❌ Incorrect code. Please try again.</div>
    </div>

    <script src="./secretMessage.js"></script>
    <script>
        const encryptedCode = "AEDA13579246CBFC"; // Rail Fence encrypted original code

        function decryptRailFence(cipher, rails = 3) {
            const length = cipher.length;
            const rail = Array.from({ length: rails }, () => Array(length).fill('\n'));

            let dirDown = false;
            let row = 0;
            for (let i = 0; i < length; i++) {
                rail[row][i] = '*';
                if (row === 0 || row === rails - 1) dirDown = !dirDown;
                row += dirDown ? 1 : -1;
            }

            let index = 0;
            for (let i = 0; i < rails; i++) {
                for (let j = 0; j < length; j++) {
                    if (rail[i][j] === '*' && index < cipher.length) {
                        rail[i][j] = cipher[index++];
                    }
                }
            }

            let result = '';
            row = 0;
            dirDown = false;
            for (let i = 0; i < length; i++) {
                result += rail[row][i];
                if (row === 0 || row === rails - 1) dirDown = !dirDown;
                row += dirDown ? 1 : -1;
            }

            return result;
        }

        function checkCode(event) {
            event.preventDefault();
            const userCode = document.getElementById("code").value.toUpperCase();
            const expectedCode = decryptRailFence(encryptedCode, 3);
            const secretDiv = document.getElementById("secretMessage");
            const errorDiv = document.getElementById("error");

            if (userCode === expectedCode) {
                secretDiv.innerHTML = `✅ Correct! Secret message: <strong>${SECRET_MESSAGE}</strong>`;
                secretDiv.style.display = "block";
                errorDiv.style.display = "none";
            } else {
                errorDiv.style.display = "block";
                secretDiv.style.display = "none";
            }
        }
    </script>
</body>
</html>
